<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="学术简历网站模板">
  <meta property="og:title" content="你的姓名 | 学术简历">
  <meta property="og:description" content="教育背景、科研项目、论文专利、荣誉和技能">
  <meta property="og:type" content="website">
  <title>你的姓名 | 学术简历</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="cv-page">
    <header class="cv-header">
      <h1 class="cv-title" id="profile-name">你的姓名</h1>
      <div class="header-main">
        <div class="header-row">
          <p class="header-label">基本信息：</p>
          <p class="header-value" id="basic-info">待填写</p>
        </div>
        <div class="header-row">
          <p class="header-label">研究方向：</p>
          <p class="header-value" id="research-directions">待填写</p>
        </div>
        <p class="header-note" id="profile-note"></p>
        <div class="link-row" id="profile-links"></div>
      </div>
    </header>

    <section class="cv-section" id="education-section">
      <h2 class="section-title">教育背景</h2>
      <div class="section-body" id="education-list"></div>
    </section>

    <section class="cv-section" id="experience-section">
      <h2 class="section-title">相关经历</h2>
      <div class="section-body" id="experience-list"></div>
    </section>

    <section class="cv-section" id="projects-section">
      <h2 class="section-title">科研项目</h2>
      <div class="section-body" id="projects-list"></div>
    </section>

    <section class="cv-section" id="publications-section">
      <h2 class="section-title">论文、专利</h2>
      <div class="section-body" id="publications-list"></div>
    </section>

    <section class="cv-section" id="honors-section">
      <h2 class="section-title">其他荣誉</h2>
      <div class="section-body" id="honors-list"></div>
    </section>

    <section class="cv-section" id="skills-section">
      <h2 class="section-title">专业技能</h2>
      <div class="section-body" id="skills-list"></div>
    </section>

    <section class="cv-section" id="contact-section">
      <h2 class="section-title">联系方式</h2>
      <div class="section-body" id="contact-list"></div>
    </section>
  </main>

  <script src="site-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
